# .github/workflows/fingerprint-selenium.yml
name: Refresh Fingerprint (Selenium)

on:
  schedule:
    - cron: '0 0 */7 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install selenium webdriver-manager
        sudo apt-get update
        sudo apt-get install -y chromium-browser
    
    - name: Generate fingerprint
      run: python scripts/fingerprint_selenium.py
    
    - name: Commit and push
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add config.json
        git diff --staged --quiet || git commit -m "🔄 Refresh fingerprint [skip ci]"
        git push
