name: CCTV Stream Refresh

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4          # ← v3 → v4
      with:
        persist-credentials: false
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5      # ← v4 → v5
      with:
        python-version: '3.10'
    
    - name: Run CCTV scraper
      run: python cctv.py
      env:
        PYTHONUNBUFFERED: 1
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4   # ← v3 → v4 (মেইন ফিক্স)
      with:
        name: cctv-stream
        path: output/
        retention-days: 1
        if-no-files-found: warn         # ← v4-তে নতুন অপশন
    
    - name: Commit and push changes
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add config.json output/
        git diff --staged --quiet || git commit -m "🔄 Update CCTV streams [skip ci]"
        git push
